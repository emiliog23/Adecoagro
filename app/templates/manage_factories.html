{% extends "base.html" %}
{% block title %}Fabricas | adecoagro{% endblock %}
{% block content %}
<section class="split-layout">
  <article class="card">
    <h2>Nueva fabrica</h2>
    <form method="post" class="form-grid">
      <label>Nombre
        <input type="text" name="name" required>
      </label>
      <button type="submit">Agregar fabrica</button>
    </form>
  </article>

  <article class="card">
    <h2>Fabricas existentes</h2>
    {% for factory in factories %}
    <div class="admin-item">
      <form method="post" action="{{ url_for('edit_factory', factory_id=factory.id) }}" class="inline-edit">
        <input type="text" name="name" value="{{ factory.name }}" required>
        <button type="submit">Guardar</button>
      </form>
      <form method="post" action="{{ url_for('delete_factory', factory_id=factory.id) }}">
        <button type="submit" class="danger-button">Eliminar</button>
      </form>
    </div>
    {% endfor %}
  </article>
</section>
{% endblock %}
