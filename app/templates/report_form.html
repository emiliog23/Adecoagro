{% extends "base.html" %}
{% block title %}Nuevo reporte | adecoagro{% endblock %}
{% block content %}
<section class="card">
  <h2>Nuevo reporte</h2>
  <form method="post" enctype="multipart/form-data" class="form-grid">
    <label>Titulo
      <input type="text" name="title" required>
    </label>
    <label>Categoria
      <select name="category_id" required>
        <option value="">Seleccionar</option>
        {% for category in categories %}
        <option value="{{ category.id }}">{{ category.name }}</option>
        {% endfor %}
      </select>
    </label>
    <label>Maquina
      <select name="machine_id" required>
        <option value="">Seleccionar</option>
        {% for machine in machines %}
        <option value="{{ machine.id }}">{{ machine.line.name }} - {{ machine.name }}</option>
        {% endfor %}
      </select>
    </label>
    <label>Descripcion
      <textarea name="description" rows="6" required></textarea>
    </label>
    <label>Acciones tomadas
      <textarea name="actions_taken" rows="4" placeholder="Describe las acciones realizadas"></textarea>
    </label>
    <label>Repuestos usados
      <textarea name="spare_parts_used" rows="4" placeholder="Indica repuestos o insumos utilizados"></textarea>
    </label>
    <label>Tiempo aproximado de parada (minutos)
      <input type="number" name="downtime_minutes" min="0" step="1" placeholder="Ej: 35">
    </label>
    <label>Imagenes
      <input type="file" name="images" accept=".png,.jpg,.jpeg,.gif,.webp" multiple>
    </label>
    <button type="submit">Guardar reporte</button>
  </form>
</section>
{% endblock %}
