{% extends "base.html" %}
{% block title %}Categorias | adecoagro{% endblock %}
{% block content %}
<section class="split-layout">
  <article class="card">
    <h2>Nueva categoria</h2>
    <form method="post" class="form-grid">
      <label>Nombre
        <input type="text" name="name" required>
      </label>
      <label class="checkbox"><input type="checkbox" name="active" checked> Activa</label>
      <button type="submit">Agregar categoria</button>
    </form>
  </article>

  <article class="card">
    <h2>Categorias existentes</h2>
    {% for category in categories %}
    <div class="admin-item">
      <form method="post" action="{{ url_for('edit_category', category_id=category.id) }}" class="inline-edit">
        <input type="text" name="name" value="{{ category.name }}" required>
        <label class="checkbox"><input type="checkbox" name="active" {% if category.active %}checked{% endif %}> Activa</label>
        <button type="submit">Guardar</button>
      </form>
      <form method="post" action="{{ url_for('delete_category', category_id=category.id) }}">
        <button type="submit" class="danger-button">Eliminar</button>
      </form>
    </div>
    {% endfor %}
  </article>
</section>
{% endblock %}
