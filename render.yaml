services:
  - type: web
    name: adecoagro
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn run:app
    envVars:
      - key: FLASK_DEBUG
        value: "0"
      - key: DATA_DIR
        value: /opt/render/project/src/data
    disk:
      name: adecoagro-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
